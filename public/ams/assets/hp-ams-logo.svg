<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">HP AMS logo</title>
  <desc id="desc">Human Performance Athlete Monitoring System logo with a shield mark and wordmark.</desc>
  <defs>
    <linearGradient id="shieldGradient" x1="40" x2="150" y1="28" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f7dff"/>
      <stop offset="0.54" stop-color="#1769ff"/>
      <stop offset="1" stop-color="#0b2b73"/>
    </linearGradient>
    <linearGradient id="signalGradient" x1="54" x2="142" y1="52" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbe7ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" flood-color="#071225" flood-opacity="0.24" stdDeviation="14"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <path fill="url(#shieldGradient)" d="M96 18 154 40v50c0 38-22 68-58 82-36-14-58-44-58-82V40l58-22Z"/>
    <path fill="none" stroke="#ffffff" stroke-opacity="0.52" stroke-width="5" d="M96 28 144 46v43c0 30-17 55-48 68-31-13-48-38-48-68V46l48-18Z"/>
    <path fill="url(#signalGradient)" d="M66 68h18v48H66V68Zm30 0h18v48H96V68Zm30 0h18v48h-18V68ZM79 57h52v16H79V57Zm0 59h52v16H79v-16Z"/>
    <path fill="#24bf79" d="M144 128a14 14 0 1 1-28 0 14 14 0 0 1 28 0Z"/>
    <path fill="#ffffff" d="M124 127.7 129 133l11-14 5 4-15.5 19.5-10.5-10.8 5-4Z"/>
  </g>

  <g fill="#11131a">
    <text x="190" y="88" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="900" letter-spacing="-1">HP AMS</text>
    <text x="192" y="125" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" letter-spacing="2.6" fill="#1769ff">HUMAN PERFORMANCE ATHLETE MONITORING</text>
  </g>
</svg>
